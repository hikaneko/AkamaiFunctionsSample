#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "zuplo-ai-chat"
version = "0.1.0"
authors = ["hikaneko"]
description = ""

[[trigger.http]]
route = "/api/..."
component = "api-proxy"

[[trigger.http]]
route = "/..."
component = "zuplo-ai-chat"

[component.zuplo-ai-chat]
source = { url = "https://github.com/spinframework/spin-fileserver/releases/download/v0.3.0/spin_static_fs.wasm", digest = "sha256:ef88708817e107bf49985c7cefe4dd1f199bf26f6727819183d5c996baa3d148" }
files = [{ source = "assets", destination = "/" }]

[component.api-proxy]
source = "spin.wasm"
allowed_outbound_hosts = ["https://zuplo-proxy.akamai.tech", "http://edc.edgesuite.net"]

[component.api-proxy.build]
command = "npm run build"
watch = ["src/**/*.js", "package.json"]
